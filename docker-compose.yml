# SnapReq dev compose. Runs from its own compose project and attaches to the
# shared reexec-net bridge owned by EchoChamber's compose, so it can reach
# EchoChamber at http://app:8080/internal/ingest.
#
# Start EchoChamber first (it creates reexec-net), then `docker compose up` here.
services:
  snapreq:
    build: .
    image: snapreq:dev
    ports:
      # host 9090 → container LISTEN_ADDR (:8080)
      - "9090:8080"
    # All runtime config comes from .env (committed dev defaults). Create an
    # optional .env.local for personal/secret overrides — later files win.
    # (.env.local support needs Compose v2.24+.)
    env_file:
      - .env
      - path: .env.local
        required: false
    networks:
      - reexec-net

# Shared bridge network defined and created by EchoChamber's compose; SnapReq
# attaches to it as an external network.
networks:
  reexec-net:
    name: reexec-net
    external: true
