# SnapReq workspace compose. Brings up SnapReq alongside EchoChamber so captured
# requests have somewhere to land. EchoChamber is expected to expose
# /internal/ingest and authenticate with INTERNAL_INGEST_TOKEN.
services:
  snapreq:
    build: .
    image: snapreq:dev
    ports:
      - "8080:8080"
    environment:
      # Required
      ECHOCHAMBER_URL: "http://echochamber:8080"
      ECHOCHAMBER_TOKEN: "${ECHOCHAMBER_TOKEN:-dev-ingest-token}"
      # Optional — uncomment FORWARD_URL to run in Mode A (in-path proxy)
      LISTEN_ADDR: ":8080"
      # FORWARD_URL: "http://upstream:9000"
      FORWARD_TIMEOUT_MS: "5000"
      CAPTURE_TIMEOUT_MS: "2000"
      MAX_BODY_BYTES: "1048576"
      LOG_LEVEL: "info"
      CAPTURE_AUTH_HEADERS: "false"
    # depends_on:
    #   - echochamber

  # Defined in the EchoChamber repo's own compose; referenced here for context.
  # echochamber:
  #   image: echochamber:dev
  #   environment:
  #     INTERNAL_INGEST_TOKEN: "${ECHOCHAMBER_TOKEN:-dev-ingest-token}"
